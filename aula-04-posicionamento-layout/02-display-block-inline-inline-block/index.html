<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>exemplo de display</h1>

    <h2>display: block</h2>
    <div class="block">Bloco 1 </div>
    <div class="block">Bloco 2 </div>

    <h2>display: inline</h2>
    <div class="inline">Texto Inline 1</div>
    <div class="inline">Texto Inline 2</div>

    <h2>display: inline-block</h2>
    <div class="inline-block">Elemento visual 1</div>
    <div class="inline-block">Elemento visual 2</div>
</body>
</html>
